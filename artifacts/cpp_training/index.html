const state = { activeWeek: 0, expandedDay: null, completed: new Set() };

  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) state.completed = new Set(JSON.parse(saved));
} catch (e) {}

// ── HELPERS ───────────────────────────────────────────────────────────────────

const DT = window.innerWidth >= 768;
function sz(n) { return DT ? Math.round(n * 1.55) : n; }

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...state.completed])); } catch (e) {}
}

function buildHeader() {
  const totalDays = weeks.reduce((sum, w) => sum + w.days.length, 0);
  const completedCount = state.completed.size;
  const pct = Math.round((completedCount / totalDays) * 100);

  const legend = Object.entries(dayTypes).map(([k, v]) => {
    const label = { weekday: 'standard', spill: 'plan 90 min', weekend: 'longer block', setup: 'one-time' }[k];
    return `<div style="display:flex;align-items:center;gap:6px;">
      <span style="font-size:${sz(8)}px;padding:2px 6px;background:${v.bg};color:${v.color};border:1px solid ${v.color}44;border-radius:2px;letter-spacing:0.05em;font-weight:600;">${v.label}</span>
      <span style="font-size:${sz(10)}px;color:#aaa;">${label}</span>
    </div>`;
  }).join('');

  return `
  <div style="border-bottom:1px solid #1e1e2e;padding:${DT ? '28px 48px 20px' : '20px 28px 16px'};background:#08080d;">
    <div style="font-size:${sz(10)}px;letter-spacing:0.15em;color:#888;text-transform:uppercase;margin-bottom:8px;">C++ 4-Week Refresher · Quant Tilt</div>
    <div style="display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:14px;">
      <h1 style="font-size:${sz(22)}px;font-weight:700;color:#fff;letter-spacing:-0.02em;">4-Week C++ Intensive</h1>
      <span style="font-size:${sz(11)}px;color:#aaa;font-family:'IBM Plex Sans',sans-serif;">29 days · capstone: xsfactor</span>

        <span style="font-size:${sz(10)}px;color:#aaa;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;">Progress</span>
        <span style="font-size:${sz(10)}px;color:#ccc;">${completedCount}/${totalDays} · ${pct}%</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;"></div></div>
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;">${legend}</div>
  </div>`;
}

    return `<div class="week-tab${isActive ? ' active' : ''}" data-week="${i}" style="--tab-color:${w.color};color:${isActive ? w.color : '#999'};">${label}</div>`;

    <div class="section">
      <div class="section-header" style="color:#4A90E2;">↗ Resources</div>
      <div style="display:flex;flex-direction:column;gap:4px;">${resources}</div>
    </div>
    <div class="section">
      <div class="section-header" style="color:#FFB700;">⚠ Pitfalls</div>
      <div style="display:flex;flex-direction:column;gap:6px;">${pitfalls}</div>
    </div>
    <div class="section">
      <div class="section-header" style="color:#FF4F7B;">→ Stretch Goal</div>
      <p style="font-size:${sz(11.5)}px;color:#aaa;line-height:1.6;font-family:'IBM Plex Sans',sans-serif;">${esc(d.stretch)}</p>
    </div>
    <div class="section">
      <div class="section-header" style="color:#A569BD;">⌥ Commit Message</div>
      <code class="code-block">${esc(d.commit)}</code>
    </div>
    <div class="section">
      <div class="section-header" style="color:#16A085;">◉ Interview Connection</div>
      <p style="font-size:${sz(11.5)}px;color:#aaa;line-height:1.6;font-family:'IBM Plex Sans',sans-serif;">${esc(d.interview)}</p>
    </div>`;
}

function buildDayCard(d, weekColor, dayIdx) {
  const dt = dayTypes[d.type];
  const isDone = state.completed.has(d.day);
  const isExpanded = state.expandedDay === dayIdx;
  const tagColor = tagColors[d.tag] || '#888';
  const dayNum = String(d.day).padStart(2, '0');
  const indentPx = DT ? 72 : 48;

  const details = isExpanded
    ? `<div style="margin-top:10px;padding-top:10px;padding-left:${indentPx}px;border-top:1px solid ${weekColor}22;position:relative;">
        <button data-copy-day="${d.day}" data-copy-color="${weekColor}" style="position:absolute;top:0;right:0;background:transparent;border:1px solid ${weekColor}44;color:${weekColor};font-size:${sz(9)}px;padding:3px 10px;border-radius:2px;font-family:'IBM Plex Mono',monospace;cursor:pointer;letter-spacing:0.08em;opacity:0.6;transition:all 0.15s;">copy</button>
        ${buildDayDetails(d, weekColor)}
      </div>`
    : '';

  return `
  <div class="day-card${isExpanded ? ' expanded' : ''}${isDone ? ' done' : ''}" style="--week-color:${weekColor};" data-day-idx="${dayIdx}">
    <div class="day-row">
      <div class="checkbox${isDone ? ' checked' : ''}" style="--week-color:${weekColor};" data-checkbox="${d.day}"></div>
      <span style="font-size:${sz(10)}px;color:${isExpanded ? weekColor : '#777'};font-weight:700;width:${sz(32)}px;flex-shrink:0;">D${dayNum}</span>
      <span style="font-size:${sz(8)}px;padding:2px 6px;background:${dt.bg};color:${dt.color};border:1px solid ${dt.color}44;border-radius:2px;letter-spacing:0.05em;font-weight:600;width:${sz(48)}px;text-align:center;flex-shrink:0;">${dt.label}</span>
      <span style="font-size:${sz(9)}px;padding:2px 6px;background:${tagColor}22;color:${tagColor};border:1px solid ${tagColor}33;border-radius:2px;letter-spacing:0.05em;font-weight:600;width:${sz(76)}px;text-align:center;flex-shrink:0;">${esc(d.tag)}</span>
      <span style="font-size:${sz(12.5)}px;font-weight:600;color:${isExpanded ? '#fff' : isDone ? '#777' : '#ddd'};flex:1;${isDone ? 'text-decoration:line-through;' : ''}">${esc(d.title)}</span>
      <span style="font-size:${sz(10)}px;transition:transform 0.15s;transform:${isExpanded ? 'rotate(90deg)' : 'rotate(0deg)'};color:${isExpanded ? weekColor : '#666'};">▶</span>
    </div>
    ${details}
  </div>`;
}

function buildCheckpoint(week) {
  return `
  <div style="margin-top:20px;padding:${DT ? '18px 22px' : '12px 16px'};background:${week.color}10;border:1px dashed ${week.color}55;border-radius:4px;">
    <div style="font-size:${sz(9)}px;letter-spacing:0.15em;color:${week.color};text-transform:uppercase;font-weight:700;margin-bottom:4px;">◆ Weekly Checkpoint</div>
    <div style="font-size:${sz(12.5)}px;color:#ddd;font-weight:600;margin-bottom:3px;">${esc(week.checkpoint.name)}</div>
    <div style="font-size:${sz(11)}px;color:#bbb;font-family:'IBM Plex Sans',sans-serif;line-height:1.5;">${esc(week.checkpoint.desc)}</div>
  </div>`;
}

function buildReflection(week) {
  return `
  <div style="margin-top:14px;padding:${DT ? '18px 22px' : '12px 16px'};background:#0d0d18;border:1px solid #1e1e2e;border-left:3px solid ${week.color};border-radius:4px;">
    <div style="font-size:${sz(9)}px;letter-spacing:0.15em;color:#aaa;text-transform:uppercase;font-weight:700;margin-bottom:6px;">✎ End-of-Week Reflection</div>
    <p style="font-size:${sz(11.5)}px;color:#bbb;font-family:'IBM Plex Sans',sans-serif;line-height:1.6;font-style:italic;">${esc(week.reflection)}</p>
  </div>`;
}

function buildNavigation() {
  const week = weeks[state.activeWeek];
  const atStart = state.activeWeek === 0;
  const atEnd = state.activeWeek === weeks.length - 1;
  return `
  <div style="margin-top:24px;display:flex;justify-content:space-between;align-items:center;">
    <button data-nav="prev" ${atStart ? 'disabled' : ''} style="background:transparent;border:1px solid #333;color:${atStart ? '#555' : '#bbb'};padding:${DT ? '11px 24px' : '8px 16px'};font-size:${sz(11)}px;border-radius:3px;">← prev</button>
    <button id="reset-btn" style="background:transparent;border:none;color:#888;font-size:${sz(10)}px;letter-spacing:0.05em;">reset progress</button>
    <button data-nav="next" ${atEnd ? 'disabled' : ''} style="background:${atEnd ? 'transparent' : week.color + '15'};border:1px solid ${atEnd ? '#333' : week.color + '44'};color:${atEnd ? '#555' : week.color};padding:${DT ? '11px 24px' : '8px 16px'};font-size:${sz(11)}px;border-radius:3px;">next →</button>
  </div>`;
}

function buildHTML() {
  const week = weeks[state.activeWeek];
  const cards = week.days.map((d, i) => buildDayCard(d, week.color, i)).join('');
  return `
  <div style="background:#0a0a0f;min-height:100vh;font-family:'IBM Plex Mono','Courier New',monospace;color:#e0e0e0;">
    ${buildHeader()}
    ${buildWeekTabs()}
    <div style="padding:${DT ? '32px 48px' : '22px 28px'};max-width:${DT ? 'none' : '940px'};">
      ${buildWeekHeader(week)}
      ${week.project ? buildCapstoneCallout(week) : ''}
      <div style="display:flex;flex-direction:column;gap:${DT ? '8px' : '5px'};">${cards}</div>
      ${week.checkpoint ? buildCheckpoint(week) : ''}
      ${week.reflection ? buildReflection(week) : ''}
      ${buildNavigation()}
    </div>
  </div>`;
}

// ── RENDER + EVENTS ───────────────────────────────────────────────────────────

function attachListeners() {
  document.querySelectorAll('[data-week]').forEach(el => {
    el.addEventListener('click', () => {
      state.activeWeek = +el.dataset.week;
      state.expandedDay = null;
      render();
    });
  });

  document.querySelectorAll('[data-day-idx]').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('[data-checkbox]')) return;
      const idx = +el.dataset.dayIdx;
      state.expandedDay = state.expandedDay === idx ? null : idx;
      render();
    });
  });

  document.querySelectorAll('[data-checkbox]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const n = +el.dataset.checkbox;
      state.completed.has(n) ? state.completed.delete(n) : state.completed.add(n);
      save();
      render();
    });
  });

  document.querySelectorAll('[data-copy-day]').forEach(btn => {
    btn.addEventListener('mouseenter', () => { btn.style.opacity = '1'; });
    btn.addEventListener('mouseleave', () => { if (btn.textContent === 'copy') btn.style.opacity = '0.6'; });
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const dayNum = +btn.dataset.copyDay;
      const origColor = btn.dataset.copyColor;
      const d = weeks.flatMap(w => w.days).find(x => x.day === dayNum);
      if (!d) return;

      const text = [
        `D${String(dayNum).padStart(2,'0')}: ${d.title}`,
        `Type: ${d.type}  ·  Tag: ${d.tag}`,
        '',
        d.desc,
        '',
        '◆ DONE WHEN',
        d.doneWhen,
        '',
        '↗ RESOURCES',
        ...d.resources.map(r => `  → ${r.label}\n    ${r.url}`),
        '',
        '⚠ PITFALLS',
        ...d.pitfalls.map(p => `  · ${p}`),
        '',
        '→ STRETCH GOAL',
        `  ${d.stretch}`,
        '',
        '⌥ COMMIT',
        `  ${d.commit}`,
        '',
        '◉ INTERVIEW CONNECTION',
        `  ${d.interview}`,
      ].join('\n');

      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ copied';
        btn.style.color = '#7CFF6B';
        btn.style.borderColor = '#7CFF6B44';
        btn.style.opacity = '1';
        setTimeout(() => {
          btn.textContent = 'copy';
          btn.style.color = origColor;
          btn.style.borderColor = origColor + '44';
          btn.style.opacity = '0.6';
        }, 2000);
      }).catch(() => {
        btn.textContent = '✗ failed';
        setTimeout(() => { btn.textContent = 'copy'; }, 2000);
      });
    });
  });

  document.querySelector('[data-nav="prev"]')?.addEventListener('click', () => {
    if (state.activeWeek > 0) { state.activeWeek--; state.expandedDay = null; render(); }
  });

  document.querySelector('[data-nav="next"]')?.addEventListener('click', () => {
    if (state.activeWeek < weeks.length - 1) { state.activeWeek++; state.expandedDay = null; render(); }
  });

  document.getElementById('reset-btn')?.addEventListener('click', () => {
    if (!confirm('Reset all progress? This cannot be undone.')) return;
    state.completed = new Set();
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    render();
  });
}

function render() {
  document.getElementById('root').innerHTML = buildHTML();
  attachListeners();
}

render();
</script>

        async src="//gc.zgo.at/count.js"></script>
</body>
