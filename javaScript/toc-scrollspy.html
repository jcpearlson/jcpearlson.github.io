<script>
document.addEventListener('DOMContentLoaded', function() {
  // Only run on post pages (where there is a title banner)
  if (!document.querySelector('.quarto-title-banner')) return;

  const mainContainer = document.querySelector('#quarto-content');
  const articleContent = mainContainer.querySelector('main#quarto-document-content');
  const headings = articleContent.querySelectorAll('h2, h3');

  if (!mainContainer || !articleContent || headings.length < 2) return;

  // --- 1. CREATE THE TOC STRUCTURE ---
  const tocNav = document.createElement('nav');
  tocNav.className = 'scrollspy-nav';

  const tocHeader = document.createElement('p');
  tocHeader.className = 'scrollspy-header';
  tocHeader.textContent = 'Contents';
  tocNav.appendChild(tocHeader);

  const tocList = document.createElement('ol');
  tocList.className = 'scrollspy-list';

  headings.forEach(heading => {
    if (!heading.id) {
      const slug = heading.textContent.trim().toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]+/g, '');
      heading.id = slug;
    }

    const tocItem = document.createElement('li');
    tocItem.className = `scrollspy-item toc-level-${heading.tagName.toLowerCase()}`;

    const tocLink = document.createElement('a');
    tocLink.href = `#${heading.id}`;
    tocLink.textContent = heading.textContent;
    tocLink.className = 'scrollspy-link';

    tocItem.appendChild(tocLink);
    tocList.appendChild(tocItem);
  });

  tocNav.appendChild(tocList);
  mainContainer.prepend(tocNav);

  // --- 2. SCROLL-BASED HIGHLIGHT LOGIC ---
  const tocLinks = tocList.querySelectorAll('.scrollspy-link');
  // OFFSET must account for the navbar height (~91px) plus the extra scroll
  // compensation the browser applies when the navbar slides back in after a
  // scroll-up click. In practice the heading can land ~230px from the top, so
  // we use navbar height * 3 as a safe ceiling.
  const navbar = document.querySelector('nav.navbar');
  const OFFSET = navbar ? navbar.offsetHeight * 3 : 280;

  // When the user clicks a TOC link, we lock onto that heading ID.
  // The lock only releases once the scroll naturally catches up to that section,
  // preventing the scroll listener from overriding the click mid-animation.
  let lockedHeadingId = null;

  function setActive(link) {
    tocLinks.forEach(l => l.classList.remove('active'));
    if (link) link.classList.add('active');
  }

  function getCurrentHeading() {
    let current = null;
    headings.forEach(heading => {
      if (heading.getBoundingClientRect().top <= OFFSET) {
        current = heading;
      }
    });
    return current || headings[0];
  }

  function updateActive() {
    const current = getCurrentHeading();

    // If we clicked a link, hold on that heading until the scroll
    // naturally arrives at it — then release the lock
    if (lockedHeadingId) {
      if (current.id === lockedHeadingId) {
        lockedHeadingId = null; // arrived — hand back to scroll tracking
      } else {
        return; // still animating, don't override
      }
    }

    const activeLink = tocList.querySelector(`.scrollspy-link[href="#${current.id}"]`);
    setActive(activeLink);
  }

  // On click: immediately highlight + lock onto target heading
  tocLinks.forEach(link => {
    link.addEventListener('click', function() {
      setActive(this);
      lockedHeadingId = this.getAttribute('href').slice(1);
    });
  });

  // Set initial state on load
  updateActive();

  // Update on scroll
  window.addEventListener('scroll', updateActive, { passive: true });
});
</script>
