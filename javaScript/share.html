<script>
document.addEventListener('DOMContentLoaded', function() {
  // Don't run on the main listing page
  if (document.querySelector('.quarto-listing-container-default')) {
    return;
  }

  const contentArea = document.querySelector('main#quarto-document-content');
  if (!contentArea) return;

  // --- 1. GATHER METADATA ---
  const title = document.querySelector('.quarto-title.column-body h1.title')?.textContent.trim() || 'Article';
  let author = 'Josh Pearlson';
  let date = '';
  const url = window.location.href;

  const metaHeadings = document.querySelectorAll('.quarto-title-meta-heading');
  metaHeadings.forEach(heading => {
    const headingText = heading.textContent.trim();
    const contentsEl = heading.nextElementSibling;
    if (contentsEl && contentsEl.classList.contains('quarto-title-meta-contents')) {
      if (headingText === 'Author') author = contentsEl.querySelector('p')?.textContent.trim() || author;
      if (headingText === 'Published') date = contentsEl.querySelector('p.date')?.textContent.trim() || date;
    }
  });

  // --- 2. BUILD COMBINED FOOTER ---
  const footer = document.createElement('div');
  footer.className = 'article-footer';

  // Subscribe section (left)
  const subscribeSection = document.createElement('div');
  subscribeSection.className = 'subscribe-section';
  subscribeSection.innerHTML = `
    <p class="subscribe-label">Get notified when a new article drops.</p>
    <form action="https://buttondown.com/api/emails/embed-subscribe/jcp"
          method="post"
          class="subscribe-form"
          target="_blank">
      <input type="email" name="email" placeholder="your@email.com" required />
      <button type="submit">Subscribe →</button>
    </form>
  `;

  subscribeSection.querySelector('form').addEventListener('submit', function() {
    if (window.goatcounter && window.goatcounter.count) {
      window.goatcounter.count({ path: 'subscribe-article', title: 'Newsletter Signup - Article', event: true });
    }
  });

  // Share button (right)
  const shareContainer = document.createElement('div');
  shareContainer.className = 'share-article-container';

  const shareButton = document.createElement('button');
  shareButton.className = 'share-article-button';
  shareButton.textContent = 'Share this Article';

  shareContainer.appendChild(shareButton);

  footer.appendChild(subscribeSection);
  footer.appendChild(shareContainer);
  contentArea.appendChild(footer);

  // --- 3. SHARE CLICK HANDLER ---
  shareButton.addEventListener('click', function() {
    const shareText = `"${title}" by ${author} (Published: ${date}): ${url}`;
    navigator.clipboard.writeText(shareText).then(() => {
      const originalText = shareButton.textContent;
      shareButton.textContent = 'Copied to clipboard!';
      shareButton.classList.add('copied');
      setTimeout(() => {
        shareButton.textContent = originalText;
        shareButton.classList.remove('copied');
      }, 3000);
    }).catch(() => {
      const originalText = shareButton.textContent;
      shareButton.textContent = 'Copy failed!';
      setTimeout(() => { shareButton.textContent = originalText; }, 3000);
    });
  });
});
</script>
