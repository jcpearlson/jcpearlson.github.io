<script>
// Synchronous: runs at end-of-body parse, before first paint, to prevent flash
if (document.querySelector('.quarto-title-banner')) {
  document.body.classList.add('jcp-article-page');
}

const _vp = document.querySelector('meta[name="viewport"]');
if (_vp && !_vp.content.includes('viewport-fit')) {
  _vp.content += ', viewport-fit=cover';
}

document.addEventListener('DOMContentLoaded', function() {
  if (!document.querySelector('.quarto-title-banner')) return;

  const slug = location.pathname.split('/').filter(Boolean).pop().replace('.html','');

  const titleEl = document.querySelector('.quarto-title h1');
  const title = titleEl ? titleEl.textContent.trim() : slug;
  let date = '';
  document.querySelectorAll('.quarto-title-meta-heading').forEach((h, i) => {
    if (h.textContent.trim() === 'Published') {
      const contents = document.querySelectorAll('.quarto-title-meta-contents');
      if (contents[i]) date = contents[i].textContent.trim();
    }
  });
  const catEls = document.querySelectorAll('.quarto-category');
  const cats = Array.from(catEls).map(e => e.textContent.trim());

  const tabs = ['home','about','articles','projects','contact'];
  const hrefs = {
    home: '/', about: '/about/',
    articles: '/articles/', projects: '/projects/',
    contact: '/contact/'
  };
  const tabsHTML = tabs.map(t => {
    const active = t === 'articles' ? ' t-tab-active' : '';
    const indicator = t === 'articles' ? '&#9656;' : '&nbsp;';
    return `<a href="${hrefs[t]}" class="t-tab${active}"><span class="t-tab-indicator">${indicator}</span>${t}</a>`;
  }).join('');

  const tabBar = document.createElement('div');
  tabBar.className = 'jcp-article-tabbar';
  tabBar.innerHTML = `<div class="t-tabs">
    ${tabsHTML}
    <div class="t-tabs-spacer"></div>
    <div class="t-title">jcp@joshpearlson: ~/articles/${slug}</div>
  </div>`;
  document.body.prepend(tabBar);

  const statusBar = document.createElement('div');
  statusBar.className = 'jcp-article-statusbar';
  const catsDisplay = cats.length ? cats.map(c => `<span class="t-chip">${c}</span>`).join(' ') : '';
  statusBar.innerHTML = `<div class="t-status">
    <span><span class="t-status-dot">&#9679;</span> reading</span>
    <span>${date}</span>
    ${catsDisplay}
    <span id="t-art-read-time"></span>
    <span class="t-status-weather" id="t-status-weather">
      <span class="t-weather-glyph">&#183;</span> NYC --&deg;F <span class="t-sep">&#183;</span> 40.7128&deg;&nbsp;N, 74.0060&deg;&nbsp;W
    </span>
  </div>`;
  document.body.append(statusBar);

  const catChips = cats.map(c => `<span class="t-chip">${c}</span>`).join('');
  const articleHeader = document.createElement('div');
  articleHeader.className = 't-art-header';
  articleHeader.innerHTML = `
    <div class="t-art-prompt"><span class="t-prompt">$</span> cat ./${slug}.md</div>
    <div class="t-art-title">${title}</div>
    <div class="t-art-meta">
      <span class="t-art-date">${date}</span>
      ${catChips}
    </div>
    <div class="t-art-rule"></div>
  `;

  const main = document.querySelector('main#quarto-document-content');
  if (main) main.prepend(articleHeader);

  document.body.style.removeProperty('padding-top');

  fetch('https://api.open-meteo.com/v1/forecast?latitude=40.7128&longitude=-74.0060&current=temperature_2m,weather_code&temperature_unit=fahrenheit')
    .then(r => r.json())
    .then(d => {
      const temp = Math.round(d.current.temperature_2m);
      const w = document.getElementById('t-status-weather');
      if (w) w.innerHTML = `<span class="t-weather-glyph">&#183;</span> NYC ${temp}&deg;F <span class="t-sep">&#183;</span> 40.7128&deg;&nbsp;N, 74.0060&deg;&nbsp;W`;
    }).catch(() => {});

  const articleText = main ? main.textContent : '';
  const words = articleText.trim().split(/\s+/).length;
  const mins = Math.max(1, Math.round(words / 220));
  const rt = document.getElementById('t-art-read-time');
  if (rt) rt.textContent = `~${mins} min read`;
});
</script>
